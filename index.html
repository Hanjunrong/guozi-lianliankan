<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>郭子连连看</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>👩 郭子连连看 🐑</h1>
  <div class="info">
    <span>得分: <b id="score">0</b></span>
    <span>剩余: <b id="remaining">0</b></span>
    <span id="timer">⏰ 5</span>
    <button id="eliminateBtn" onclick="handleEliminateAllClick()">一键消除</button>
    <button id="testEliminateBtn" onclick="handleTestEliminateClick()">测试消除</button>
    <button id="sfxToggleBtn" onclick="handleToggleSfx()">🔊</button>
  </div>
  <div id="gameContainer">
    <div id="boardWithAxes">
      <div id="axisSpacer"></div>
      <div id="xAxis"></div>
      <div id="yAxis"></div>
      <div id="gameBoard"></div>
    </div>
  </div>
  <div id="message">
    <div>🎉 恭喜通关! 🎉</div>
    <div id="finalScore">得分: 0</div>
    <button id="restartBtn" onclick="restartGame()">重新开始</button>
  </div>

  <script src="assets/audio/sfx.js"></script>
  <script src="game.js"></script>
  <script src="ui.js"></script>
</body>
</html>
